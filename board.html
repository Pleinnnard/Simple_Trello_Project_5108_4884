<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tablero | Trello Básico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold" href="index.html">📋 Trello Básico</a>
    <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#modalCrear">
      + Nueva Tarea
    </button>
  </nav>

  <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index:9999"></div>

  <div class="container-fluid py-4">
    <div class="row g-3" id="board">
      <div class="col-md-4">
        <div class="kanban-col" id="col-todo" data-status="todo">
          <h5 class="col-title todo-title">📌 To Do</h5>
          <div class="task-list" id="list-todo" ondragover="event.preventDefault()" ondrop="onDrop(event, 'todo')"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kanban-col" id="col-doing" data-status="doing">
          <h5 class="col-title doing-title">⚙️ Doing</h5>
          <div class="task-list" id="list-doing" ondragover="event.preventDefault()" ondrop="onDrop(event, 'doing')"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kanban-col" id="col-done" data-status="done">
          <h5 class="col-title done-title">✅ Done</h5>
          <div class="task-list" id="list-done" ondragover="event.preventDefault()" ondrop="onDrop(event, 'done')"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Crear -->
  <div class="modal fade" id="modalCrear" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nueva Tarea</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Título <span class="text-danger">*</span></label>
            <input type="text" id="input-title" class="form-control" placeholder="Ej: Diseñar mockup"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea id="input-desc" class="form-control" rows="3" placeholder="Opcional..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Estado inicial</label>
            <select id="input-status" class="form-select">
              <option value="todo">To Do</option>
              <option value="doing">Doing</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="crearTarea()">Crear Tarea</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
